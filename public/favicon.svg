<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="VouchEdge"
  data-craft-level="2"
  data-mark-core="check"
  data-optical-margin="120"
  data-no-gimmick="1">
  <!--
    VouchEdge master mark — craft level 2
    craft:level=2 markCore=check optical:margin=120 noGimmick=1
    Trust shield + verification check (vouch). No VE letters in icon.
  -->
  <defs>
    <linearGradient id="ve-plate" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06101C"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ve-shield-stroke" x1="240" y1="160" x2="780" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A5F3FC"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="ve-shield-fill" x1="512" y1="180" x2="512" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="ve-check" x1="320" y1="360" x2="720" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FEFF"/>
      <stop offset="45%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="ve-glow" cx="50%" cy="42%" r="46%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.16"/>
      <stop offset="70%" stop-color="#00E5FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#ve-plate)"/>
  <circle class="ve-mark-glow" cx="512" cy="468" r="300" fill="url(#ve-glow)"/>

  <!-- Trust shield -->
  <path
    class="ve-mark-shield"
    d="M512 168
       C602 168 718 222 760 274
       V530
       C760 668 652 798 512 868
       C372 798 264 668 264 530
       V274
       C306 222 422 168 512 168 Z"
    fill="url(#ve-shield-fill)"
    stroke="url(#ve-shield-stroke)"
    stroke-width="32"
    stroke-linejoin="round"
  />

  <!-- Verification check (vouch) — centered in shield body -->
  <g class="ve-mark-check ve-mark-identity ve-mark-optical" aria-label="Verified">
    <path
      class="mark-check"
      d="M340 500 L460 640 L700 360"
      fill="none"
      stroke="url(#ve-check)"
      stroke-width="72"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
