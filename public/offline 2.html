<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f19" />
    <title>VouchEdge Offline</title>
    <style>
      :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; color: #f8fafc; background: radial-gradient(circle at 50% 0%, #083344 0, #020617 42%); }
      main { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      section { width: min(100%, 420px); padding: 28px; border: 1px solid #22d3ee40; border-radius: 24px; background: #020617e8; box-shadow: 0 24px 80px #0009; }
      small { color: #67e8f9; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
      h1 { margin: 12px 0 8px; font-size: 28px; }
      p { margin: 0 0 20px; color: #cbd5e1b8; line-height: 1.6; }
      button { width: 100%; min-height: 48px; border: 0; border-radius: 14px; background: #00f0ff; color: #020617; font-weight: 900; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <section>
        <small>Connection paused</small>
        <h1>VouchEdge is offline</h1>
        <p>Live boards and verified lineup updates require a connection. Reconnect, then retry without losing your installed app.</p>
        <form action="/" method="get"><button type="submit">Try again</button></form>
      </section>
    </main>
  </body>
</html>
