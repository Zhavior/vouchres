<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="VouchEdge VE"
  data-craft-level="2"
  data-optical-letter-height="276"
  data-optical-gap="44"
  data-optical-margin="88"
  data-no-gimmick="1">
  <!--
    VouchEdge master mark — craft level 2
    craft:level=2 optical:letterHeight=276 optical:gap=44 optical:margin=88 noGimmick=1
    Optical lockup: VE centered in shield with equal stem weight, classic E mid-bar (82%),
    restrained glow, no arrow/glitch tips. Trust shield frames the monogram — letters lead.
  -->
  <defs>
    <linearGradient id="ve-plate" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06101C"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ve-shield-stroke" x1="240" y1="160" x2="780" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A5F3FC"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="ve-shield-fill" x1="512" y1="180" x2="512" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="ve-letter" x1="300" y1="380" x2="760" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FEFF"/>
      <stop offset="55%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="ve-glow" cx="50%" cy="42%" r="46%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.16"/>
      <stop offset="70%" stop-color="#00E5FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#ve-plate)"/>
  <circle class="ve-mark-glow" cx="512" cy="468" r="300" fill="url(#ve-glow)"/>

  <!-- Trust shield — refined stroke, generous letter safe zone -->
  <path
    class="ve-mark-shield"
    d="M512 176
       C598 176 708 228 748 278
       V528
       C748 662 646 788 512 856
       C378 788 276 662 276 528
       V278
       C316 228 426 176 512 176 Z"
    fill="url(#ve-shield-fill)"
    stroke="url(#ve-shield-stroke)"
    stroke-width="30"
    stroke-linejoin="round"
  />

  <!--
    VE optical lockup (ve-mark-optical)
    Stem ~56px · letter height 276 · inter-letter gap 44 · shield margin ≥88
  -->
  <g class="ve-mark-letters ve-mark-identity ve-mark-optical" aria-label="VE">
    <!-- V — single tip, matched stem weight -->
    <path
      class="letter-v"
      d="M318 402
         L430 678
         L494 678
         L606 402
         L542 402
         L462 618
         L382 402
         Z"
      fill="url(#ve-letter)"
    />
    <!-- E — classic proportions, mid-bar ~82% width, no gimmick tip -->
    <g class="letter-e">
      <path d="M650 402 H706 V678 H650 Z" fill="url(#ve-letter)"/>
      <path d="M706 402 H790 V458 H706 Z" fill="url(#ve-letter)"/>
      <path d="M706 512 H772 V568 H706 Z" fill="url(#ve-letter)"/>
      <path d="M706 622 H790 V678 H706 Z" fill="url(#ve-letter)"/>
    </g>
  </g>
</svg>
