<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="VouchEdge VE"
  data-craft-level="2"
  data-optical-letter-height="280"
  data-optical-gap="40"
  data-optical-margin="120"
  data-optical-max-x="700"
  data-letter-style="starwars-outline"
  data-no-gimmick="1">
  <!--
    VouchEdge master mark — craft level 2
    craft:level=2 optical:letterHeight=280 optical:gap=40 optical:margin=120 optical:maxX=700
    letterStyle=starwars-outline noGimmick=1
    VE = hollow outlined Star Wars–style display letters drawn BEHIND the trust shield.
  -->
  <defs>
    <linearGradient id="ve-plate" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06101C"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ve-shield-stroke" x1="240" y1="160" x2="780" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A5F3FC"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="ve-shield-fill" x1="512" y1="180" x2="512" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.015"/>
    </linearGradient>
    <linearGradient id="ve-letter" x1="300" y1="330" x2="720" y2="670" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FEFF"/>
      <stop offset="40%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="ve-glow" cx="50%" cy="42%" r="46%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#00E5FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#ve-plate)"/>
  <circle class="ve-mark-glow" cx="512" cy="468" r="300" fill="url(#ve-glow)"/>

  <!-- VE BEHIND shield — Star Wars hollow outline letters -->
  <g
    class="ve-mark-letters ve-mark-identity ve-mark-optical ve-mark-starwars"
    aria-label="VE"
    fill="none"
    stroke="url(#ve-letter)"
    stroke-width="42"
    stroke-linejoin="miter"
    stroke-linecap="square"
    stroke-miterlimit="2"
  >
    <!-- V -->
    <path class="letter-v" d="M336 360 L456 620 L576 360" />
    <!-- E -->
    <path
      class="letter-e"
      d="M618 360 V620
         M618 360 H710
         M618 490 H688
         M618 620 H710"
    />
  </g>

  <!-- Trust shield ON TOP -->
  <path
    class="ve-mark-shield"
    d="M512 168
       C602 168 718 222 760 274
       V530
       C760 668 652 798 512 868
       C372 798 264 668 264 530
       V274
       C306 222 422 168 512 168 Z"
    fill="url(#ve-shield-fill)"
    stroke="url(#ve-shield-stroke)"
    stroke-width="30"
    stroke-linejoin="round"
  />
</svg>
