<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="VouchEdge">
  <!--
    VouchEdge master mark (vector → 4K PNG via brand:assets)
    Psychology: one silhouette. Shield = trust institution.
    Check-V = vouch / verified + Edge monogram. Cyan on navy = competence, not casino.
    Avoids person-in-shield (reads as privacy) and sportsbook clichés (balls, $).
  -->
  <defs>
    <linearGradient id="ve-plate" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07111F"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ve-shield-stroke" x1="200" y1="140" x2="820" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A5F3FC"/>
      <stop offset="45%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="ve-shield-fill" x1="512" y1="160" x2="512" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#00E5FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22D3A6" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="ve-vouch" x1="300" y1="280" x2="760" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0FFFF"/>
      <stop offset="35%" stop-color="#67E8F9"/>
      <stop offset="70%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="ve-edge-facet" x1="620" y1="300" x2="780" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="ve-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.34"/>
      <stop offset="55%" stop-color="#00E5FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="ve-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App-icon plate (squircle-friendly) -->
  <rect width="1024" height="1024" rx="224" fill="url(#ve-plate)"/>
  <circle cx="512" cy="460" r="340" fill="url(#ve-glow)"/>

  <!-- Trust shield — primary silhouette -->
  <path
    class="ve-mark-shield"
    d="M512 148
       C612 148 742 210 786 268
       V536
       C786 690 668 820 512 904
       C356 820 238 690 238 536
       V268
       C282 210 412 148 512 148 Z"
    fill="url(#ve-shield-fill)"
    stroke="url(#ve-shield-stroke)"
    stroke-width="40"
    stroke-linejoin="round"
  />

  <!-- Inner seal ring (verification certificate cue; soft at tiny sizes) -->
  <path
    class="ve-mark-seal"
    d="M512 236
       C588 236 682 280 714 322
       V520
       C714 638 626 742 512 804
       C398 742 310 638 310 520
       V322
       C342 280 436 236 512 236 Z"
    stroke="#67E8F9"
    stroke-opacity="0.28"
    stroke-width="10"
    fill="none"
  />

  <!--
    Check-V “vouch edge”:
    - Reads as verified check on first glance
    - Reads as V / Edge monogram on brand learn
    - Right facet is sharper = competitive edge
  -->
  <g class="ve-mark-identity" filter="url(#ve-soft)">
    <path
      d="M318 492
         L456 652
         C468 666 490 668 504 656
         L780 340
         C796 322 788 294 766 288
         C748 283 730 290 720 306
         L492 574
         L388 456
         C374 440 348 442 336 460
         C326 474 316 480 318 492 Z"
      fill="url(#ve-vouch)"
    />
    <!-- Edge facet highlight — marketing “sharpness” cue at HD/4K -->
    <path
      d="M620 420
         L766 288
         C788 294 796 322 780 340
         L640 502
         C628 516 608 512 602 496
         C598 484 606 432 620 420 Z"
      fill="url(#ve-edge-facet)"
      fill-opacity="0.55"
    />
  </g>
</svg>
