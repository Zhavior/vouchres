<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="VouchEdge VE"
  data-craft-level="2"
  data-optical-letter-height="268"
  data-optical-gap="40"
  data-optical-margin="110"
  data-optical-max-x="720"
  data-no-gimmick="1">
  <!--
    VouchEdge master mark — craft level 2
    craft:level=2 optical:letterHeight=268 optical:gap=40 optical:margin=110 optical:maxX=720 noGimmick=1
    Optical lockup: VE centered, fully inside shield (max x ≤720). Equal stem weight.
    Classic E mid-bar (~80%). Restrained glow. No gimmick tips.
  -->
  <defs>
    <linearGradient id="ve-plate" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06101C"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ve-shield-stroke" x1="240" y1="160" x2="780" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A5F3FC"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="ve-shield-fill" x1="512" y1="180" x2="512" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="ve-letter" x1="320" y1="390" x2="720" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FEFF"/>
      <stop offset="55%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="ve-glow" cx="50%" cy="42%" r="46%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.16"/>
      <stop offset="70%" stop-color="#00E5FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#ve-plate)"/>
  <circle class="ve-mark-glow" cx="512" cy="468" r="300" fill="url(#ve-glow)"/>

  <path
    class="ve-mark-shield"
    d="M512 168
       C602 168 718 222 760 274
       V530
       C760 668 652 798 512 868
       C372 798 264 668 264 530
       V274
       C306 222 422 168 512 168 Z"
    fill="url(#ve-shield-fill)"
    stroke="url(#ve-shield-stroke)"
    stroke-width="30"
    stroke-linejoin="round"
  />

  <!-- VE centered inside shield (safe max x = 720) -->
  <g class="ve-mark-letters ve-mark-identity ve-mark-optical" aria-label="VE">
    <path
      class="letter-v"
      d="M318 408
         L414 676
         L476 676
         L572 408
         L512 408
         L445 612
         L378 408
         Z"
      fill="url(#ve-letter)"
    />
    <g class="letter-e">
      <path d="M612 408 H662 V676 H612 Z" fill="url(#ve-letter)"/>
      <path d="M662 408 H720 V460 H662 Z" fill="url(#ve-letter)"/>
      <path d="M662 516 H704 V568 H662 Z" fill="url(#ve-letter)"/>
      <path d="M662 624 H720 V676 H662 Z" fill="url(#ve-letter)"/>
    </g>
  </g>
</svg>
