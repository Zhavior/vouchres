<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="VouchEdge VE">
  <!--
    VouchEdge master mark — VE monogram + trust shield
    Psychology: letters first (brand name), shield second (trust).
    VE = VouchEdge monogram. Cyan on navy = competence, not casino.
  -->
  <defs>
    <linearGradient id="ve-plate" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07111F"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ve-shield-stroke" x1="200" y1="140" x2="820" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A5F3FC"/>
      <stop offset="45%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="ve-shield-fill" x1="512" y1="160" x2="512" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#00E5FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22D3A6" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="ve-letter" x1="240" y1="300" x2="820" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0FDFF"/>
      <stop offset="40%" stop-color="#67E8F9"/>
      <stop offset="75%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="ve-edge-bar" x1="700" y1="500" x2="860" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="ve-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#00E5FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#ve-plate)"/>
  <circle cx="512" cy="460" r="340" fill="url(#ve-glow)"/>

  <!-- Trust shield -->
  <path
    class="ve-mark-shield"
    d="M512 148
       C612 148 742 210 786 268
       V536
       C786 690 668 820 512 904
       C356 820 238 690 238 536
       V268
       C282 210 412 148 512 148 Z"
    fill="url(#ve-shield-fill)"
    stroke="url(#ve-shield-stroke)"
    stroke-width="40"
    stroke-linejoin="round"
  />

  <!--
    VE monogram letterforms (required brand letters)
    V = Vouch · E = Edge — chunky bars so 48px still reads as letters
  -->
  <g class="ve-mark-letters ve-mark-identity" aria-label="VE">
    <!-- V (left) — true V (single tip), not a W -->
    <path
      class="letter-v"
      d="M304 410
         L430 700
         L500 700
         L626 410
         L548 410
         L465 640
         L382 410
         Z"
      fill="url(#ve-letter)"
    />
    <!-- E (right) — inside shield safe zone -->
    <g class="letter-e">
      <path d="M640 410 H692 V700 H640 Z" fill="url(#ve-letter)"/>
      <path d="M692 410 H760 V470 H692 Z" fill="url(#ve-letter)"/>
      <path d="M692 525 H742 V585 H692 Z" fill="url(#ve-edge-bar)"/>
      <path d="M692 640 H760 V700 H692 Z" fill="url(#ve-letter)"/>
      <!-- Edge tip on mid bar -->
      <path
        class="ve-mark-facet letter-e-edge"
        d="M742 525 H768 L778 555 L768 585 H742 Z"
        fill="url(#ve-edge-bar)"
      />
    </g>
  </g>
</svg>
