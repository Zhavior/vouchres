name: CI

on:
  push:
    branches:
      - main
      - "cursor/**"
      - "feat/**"
      - "fix-**"
      - "hr-**"
      - "premium-**"
  pull_request:

jobs:
  test-build-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (strict)
        run: npm run lint:strict

      - name: Run tests
        run: npm test

      - name: ParlayOS trust gates
        run: npm run verify:parlayos

      - name: Auth smoke (static audit)
        run: npm run verify:auth-smoke

      - name: Billing hardening (static audit)
        run: npm run verify:billing-hardening

      - name: Build
        run: npm run build

      - name: Staging soak (built server)
        run: |
          NODE_ENV=development PORT=3010 node dist/server.cjs &
          SERVER_PID=$!
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:3010/api/health > /dev/null; then
              break
            fi
            sleep 1
          done
          BASE_URL=http://127.0.0.1:3010 npm run staging-soak
          BASE_URL=http://127.0.0.1:3010 npm run staging-soak:strict
          kill $SERVER_PID

      - name: Bundle gzip budget
        run: npm run bundle-budget

      - name: Perf gate (CSS + JS)
        run: npm run perf-check

      - name: Lighthouse CI (graceful)
        run: LIGHTHOUSE_START_PREVIEW=1 LIGHTHOUSE_SKIP=0 npm run lighthouse-ci
        continue-on-error: true

  parlayos-e2e:
    runs-on: ubuntu-latest
    needs: test-build-budget
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build
        env:
          VITE_DEV_BYPASS_AUTH: "true"

      - name: ParlayOS smoke E2E
        run: |
          NODE_ENV=development PORT=3011 node dist/server.cjs &
          SERVER_PID=$!
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:3011/api/health > /dev/null; then
              break
            fi
            sleep 1
          done
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:3011 PLAYWRIGHT_SKIP_WEBSERVER=1 npm run test:e2e:parlay
          kill $SERVER_PID
