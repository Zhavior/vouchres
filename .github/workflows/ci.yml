name: CI

on:
  push:
    branches:
      - main
      - "cursor/**"
      - "feat/**"
      - "fix-**"
      - "hr-**"
      - "premium-**"
  pull_request:

jobs:
  test-build-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (strict)
        run: npm run lint:strict

      - name: Run tests
        run: npm test

      - name: Auth smoke (static audit)
        continue-on-error: true
        run: npm run verify:auth-smoke

      - name: Billing hardening (static audit)
        continue-on-error: true
        run: npm run verify:billing-hardening

      - name: Build
        run: npm run build

      - name: Bundle gzip budget
        run: npm run bundle-budget
