name: CI

on:
  push:
    branches:
      - main
      - "cursor/**"
      - "feat/**"
      - "fix-**"
      - "hr-**"
      - "premium-**"
  pull_request:

jobs:
  test-build-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Bundle gzip budget
        run: node scripts/bundle-budget.mjs
