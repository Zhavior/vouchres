services:
  - type: web
    name: vouchedge
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MLB_API_BASE_URL
        value: https://statsapi.mlb.com/api
      - key: GEMINI_API_KEY
        sync: false
