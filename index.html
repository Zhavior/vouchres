<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>VouchEdge — MLB Picks & Intelligence</title>
    <meta name="description" content="Track picks. Build proof. Follow the edge. The premium MLB sports proof and social intelligence platform." />
    <meta name="theme-color" content="#0b0f19" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VouchEdge" />
    <meta name="robots" content="index, follow" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/vouchedge-180.png" />

    <!-- Open Graph (Discord, iMessage, Slack, LinkedIn previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vouchres.vercel.app/" />
    <meta property="og:title" content="VouchEdge — MLB Picks & Intelligence" />
    <meta property="og:description" content="Track picks. Build proof. Follow the edge. AI-powered MLB research, live parlays, and social proof." />
    <meta property="og:image" content="https://vouchres.vercel.app/og-image.png" />
    <meta property="og:site_name" content="VouchEdge" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@vouchedge" />
    <meta name="twitter:title" content="VouchEdge — MLB Picks & Intelligence" />
    <meta name="twitter:description" content="Track picks. Build proof. Follow the edge." />
    <meta name="twitter:image" content="https://vouchres.vercel.app/og-image.png" />

    <!-- Critical above-fold shell — paints before 740KB Tailwind bundle parses -->
    <style id="ve-critical-shell">
      :root {
        color-scheme: dark;
        --font-z8: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --z8-font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        width: 100%;
        overflow-x: hidden;
        background: #020617;
        color: #fafafa;
      }
      #root {
        min-height: 100vh;
        isolation: isolate;
        opacity: 1;
        visibility: visible;
      }
      body, #root {
        font-family: var(--font-z8);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Critical boot safety — must paint before the main CSS bundle */
      .lazy-mount-fade,
      .ve-hero-in,
      .ve-edge-island-enter,
      .ve-edge-island-enter-delay-1,
      .ve-edge-island-enter-delay-2,
      .ve-edge-island-enter-delay-3 {
        opacity: 1 !important;
        visibility: visible !important;
      }
      .font-z8 { font-family: var(--font-z8); }
      .text-vouch-cyan { color: #00f0ff; }
      .text-vouch-emerald { color: #00ff94; }
      .bg-vouch-emerald { background-color: #00ff94; }
      .bg-obsidian-900 { background-color: #020617; }
      .z8-layout-root { min-height: 100vh; color: #fff; width: 100%; }
      .ve-mobile-header {
        position: sticky;
        top: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(0, 0, 0, 0.4);
        padding: 0.625rem 0.75rem;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        contain: layout style;
        transform: translateZ(0);
      }
      .glass-panel {
        background-color: rgba(2, 6, 23, 0.28);
        backdrop-filter: blur(16px) saturate(1.15);
        -webkit-backdrop-filter: blur(16px) saturate(1.15);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
      }
      .glass-border { border: 1px solid rgba(255, 255, 255, 0.1); }
      .terminal-text {
        font-family: var(--z8-font-mono);
        letter-spacing: -0.05em;
        text-transform: uppercase;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
      }
      .ve-route-suspense-fallback { min-height: 40vh; contain: strict; pointer-events: none; }
      @keyframes ve-hero-in {
        from { transform: translateY(16px); }
        to { transform: translateY(0); }
      }
      .ve-hero-in {
        opacity: 1;
        animation: ve-hero-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) ease-out;
      }
      @keyframes pulse { 50% { opacity: 0.5; } }
      .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      .ve-chunk-recovery-fallback {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: #020617;
        color: #e2e8f0;
        font-family: var(--font-z8);
      }
      .ve-chunk-recovery-fallback__card {
        max-width: 28rem;
        width: 100%;
        border: 1px solid rgba(56, 189, 248, 0.25);
        border-radius: 1.5rem;
        background: rgba(2, 6, 23, 0.92);
        padding: 1.5rem;
        box-shadow: 0 0 60px rgba(14, 165, 233, 0.12);
      }
      .ve-chunk-recovery-fallback__eyebrow {
        margin: 0 0 0.75rem;
        font-size: 0.65rem;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #6ee7b7;
      }
      .ve-chunk-recovery-fallback h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        font-weight: 900;
        color: #fff;
      }
      .ve-chunk-recovery-fallback p {
        margin: 0 0 1rem;
        font-size: 0.875rem;
        line-height: 1.5;
        color: rgba(226, 232, 240, 0.78);
      }
      .ve-chunk-recovery-fallback button {
        width: 100%;
        border: none;
        border-radius: 0.9rem;
        padding: 0.75rem 1rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: #00f0ff;
        color: #020617;
        cursor: pointer;
      }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
