<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>VouchEdge — MLB Picks & Intelligence</title>
    <meta name="description" content="Track picks. Build proof. Follow the edge. The premium MLB sports proof and social intelligence platform." />
    <meta name="theme-color" content="#0b0f19" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Discord, iMessage, Slack, LinkedIn previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vouchres.vercel.app/" />
    <meta property="og:title" content="VouchEdge — MLB Picks & Intelligence" />
    <meta property="og:description" content="Track picks. Build proof. Follow the edge. AI-powered MLB research, live parlays, and social proof." />
    <meta property="og:image" content="https://vouchres.vercel.app/og-image.png" />
    <meta property="og:site_name" content="VouchEdge" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@vouchedge" />
    <meta name="twitter:title" content="VouchEdge — MLB Picks & Intelligence" />
    <meta name="twitter:description" content="Track picks. Build proof. Follow the edge." />
    <meta name="twitter:image" content="https://vouchres.vercel.app/og-image.png" />

    <!-- Font preconnect FIRST — stops render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
